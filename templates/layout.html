<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ translations.app.name }} - {{ translations.app.title }}</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Shopify App Bridge -->
  <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
  <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>
  <!-- Zentrales CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="app-container">
    {% include "sidebar.html" %}
    <main class="main-content">
      <div class="language-selector">
        <a href="{{ url_for('set_language', language='en') }}" class="lang-option {% if lang == 'en' %}active{% endif %}">EN</a>
        <a href="{{ url_for('set_language', language='de') }}" class="lang-option {% if lang == 'de' %}active{% endif %}">DE</a>
      </div>
      {% block content %}
      <!-- Der spezifische Seiteninhalt wird hier eingefügt -->
      {% endblock %}
    </main>
  </div>
  
  {% block scripts %}
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>

  <!-- Shopify App Bridge -->
  <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
  <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>

  <script>
    // Session-Management
    $(document).ready(function() {
      // Funktionen für lokale Aktionen
      $('.refresh-btn').on('click', function() {
        window.location.reload();
      });
      
      $('.language-btn').on('click', function() {
        var language = $(this).data('language');
        window.location.href = '/set-language/' + language;
      });
    });
  </script>
  {% endblock %}
</body>
</html>
