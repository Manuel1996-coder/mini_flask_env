<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ translations.app.name }} - {{ translations.app.title }}</title>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Shopify App Bridge -->
  <script src="https://unpkg.com/@shopify/app-bridge@3"></script>
  <script src="https://unpkg.com/@shopify/app-bridge-utils@3"></script>
  <!-- Zentrales CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="app-container">
    {% include "sidebar.html" %}
    <main class="main-content">
      <div class="language-selector">
        <a href="{{ url_for('set_language', language='en') }}" class="lang-option {% if lang == 'en' %}active{% endif %}">EN</a>
        <a href="{{ url_for('set_language', language='de') }}" class="lang-option {% if lang == 'de' %}active{% endif %}">DE</a>
      </div>
      {% block content %}
      <!-- Der spezifische Seiteninhalt wird hier eingefügt -->
      {% endblock %}
    </main>
  </div>
  
  {% block scripts %}
  <script>
    var AppBridge = window['app-bridge'];
    var createApp = AppBridge.default;
    var getSessionToken = window['app-bridge-utils'].getSessionToken;

    // App Bridge initialisieren
    var app = createApp({
      apiKey: '{{ config.SHOPIFY_API_KEY }}',
      host: window.location.host,
      forceRedirect: true
    });

    // Session Token abrufen und als Header setzen
    async function setupSessionToken() {
      try {
        const sessionToken = await getSessionToken(app);
        // Token für alle zukünftigen Requests als Header setzen
        const authHeader = { Authorization: `Bearer ${sessionToken}` };
        
        // Token für alle AJAX-Requests setzen
        $.ajaxSetup({
          headers: authHeader
        });
        
        // Token auch für Fetch-Requests setzen
        const originalFetch = window.fetch;
        window.fetch = function(url, options = {}) {
          options.headers = {
            ...options.headers,
            ...authHeader
          };
          return originalFetch(url, options);
        };
        
        return sessionToken;
      } catch (error) {
        console.error('Fehler beim Abrufen des Session Tokens:', error);
        return null;
      }
    }

    // Session Token beim Laden der Seite abrufen
    document.addEventListener('DOMContentLoaded', function() {
      setupSessionToken().then(token => {
        if (!token) {
          console.error('Konnte keinen Session Token abrufen');
          // Optional: Redirect zur Installation
          // window.location.href = '/install';
        }
      });
    });
  </script>
  
  <!-- jQuery hinzufügen (wird für $.ajaxSetup benötigt) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  
  {% block additional_scripts %}{% endblock %}
  {% endblock %}
</body>
</html>
